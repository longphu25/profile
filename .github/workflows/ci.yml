name: CI

# Quality gate on every PR to main, plus pushes to main. Catches type, unit, and
# e2e regressions before they reach the deploy workflow (which builds and ships
# straight to Pages with no checks of its own).
on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (tsc + vite)
        run: bun run build

      - name: Unit tests
        run: bun test tests/unit

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
