# Deploy static content to GitHub Pages (build + deploy jobs).
# Pinned to v4 Pages actions (lowest still supported on github.com; v3 is deprecated).
name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
        env:
          VITE_TURSO_DB_URL: ${{ secrets.VITE_TURSO_DB_URL }}
          VITE_TURSO_DB_TOKEN: ${{ secrets.VITE_TURSO_DB_TOKEN }}
      - name: Verify btc-chart plugin static assets
        run: |
          test -f dist/plugins/btc-chart/style.css
          ! grep -q "@import 'tailwindcss'" dist/plugins/btc-chart/style.css
          test -f dist/plugins/btc-chart/pkg/btc_chart_wasm.js
          test -f dist/plugins/btc-chart/pkg/btc_chart_wasm_bg.wasm
      - name: Copy 404 fallback for SPA routing
        run: cp dist/index.html dist/404.html
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4